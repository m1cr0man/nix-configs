
[project]
name = "rsvp_manager"
version = "0.1.0"
description = "A simple FastAPI app for wedding seating arrangements"
requires-python = ">=3.8"
dependencies = [
    "fastapi",
    "uvicorn",
    "sqlalchemy",
    "jinja2",
    "python-multipart",
    "psycopg2-binary"
]

[project.scripts]
rsvp-manager = "rsvp_manager.main:run_app"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true
# py-modules = ["main"]

[tool.setuptools.package-data]
"*" = ["templates/*.html"]
